<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Instant - Viajes Inteligentes</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        nexus: {
                            950: '#0a0c1a',
                            900: '#11152d',
                            800: '#1a1f45',
                            DEFAULT: '#6366f1'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #0a0c1a;
            color: #f8fafc;
        }
        #map {
            height: 45vh;
            min-height: 300px;
            width: 100%;
            border-radius: 1rem;
            z-index: 1;
        }
        .active-tab {
            color: #fbbf24 !important; /* amber-400 con !important para asegurar que sobrescriba el azul */
        }
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: #1a1f45;
            border-radius: 10px;
        }
        .view-content {
            display: none;
            padding-bottom: 80px;
        }
        .view-content.active {
            display: block;
        }
        
        .leaflet-popup-content-wrapper {
            background-color: #11152d !important;
            border: 1px solid #1a1f45 !important;
            color: white !important;
            border-radius: 12px !important;
        }
        .leaflet-popup-tip {
            background-color: #11152d !important;
        }
        .custom-marker {
            background: transparent;
            border: none;
        }

        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }

        /* Estilo para la línea divisoria de la nav */
        .nav-divider {
            width: 1px;
            height: 40%;
            background-color: #1a1f45;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[2000] flex flex-col gap-2 w-[90%] max-w-md pointer-events-none"></div>

    <div id="trip-modal" class="fixed inset-0 bg-nexus-950/90 backdrop-blur-md z-[3000] hidden flex items-center justify-center">
        <div class="bg-nexus-900 border border-nexus-800 rounded-3xl p-8 shadow-2xl max-w-sm w-full mx-4 text-center">
            <h3 class="text-xl font-bold text-white mb-1" id="modal-title">Nexus Instant</h3>
            <p class="text-xs text-indigo-300/50 mb-6 uppercase tracking-widest" id="modal-desc"></p>
            
            <div class="bg-white p-4 rounded-2xl shadow-lg mb-8 inline-block">
                <img id="modal-qr" src="" alt="QR de Viaje" class="w-32 h-32" />
            </div>

            <div class="flex gap-3">
                <button onclick="cancelarViaje()" class="flex-1 py-3 bg-nexus-800 text-white rounded-xl font-bold hover:bg-red-900/30 transition-all text-sm">
                    Cancelar
                </button>
                <button onclick="confirmarViaje()" class="flex-1 py-3 bg-emerald-500 text-nexus-950 rounded-xl font-bold hover:bg-emerald-400 transition-all text-sm flex justify-center items-center gap-2">
                    <i data-lucide="check" class="w-4 h-4"></i> Completar
                </button>
            </div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto">
        <section id="map-view" class="view-content active p-4 lg:p-8">
            <header class="mb-6 flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-black text-white italic tracking-tighter uppercase">Nexus<span class="text-indigo-500">Instant</span></h2>
                    <p class="text-[10px] text-indigo-300/40 font-bold uppercase tracking-[0.3em]">Red de Transporte Inmediato</p>
                </div>
                <div class="flex items-center gap-3 bg-nexus-900 p-2 rounded-xl border border-nexus-800">
                    <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-xs shadow-[0_0_10px_rgba(99,102,241,0.5)]">JD</div>
                    <span class="text-sm font-bold text-slate-200 hidden sm:block">Juan Delgado</span>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                <aside class="xl:col-span-1 space-y-4 order-2 xl:order-1">
                    <div class="bg-nexus-900 p-6 rounded-2xl border border-nexus-800 shadow-xl">
                        <h3 class="font-bold text-amber-400 mb-5 text-[10px] uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="send" class="w-4 h-4"></i> Programar Salto
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] text-indigo-300/40 mb-1.5 font-black uppercase">Punto de Origen</label>
                                <select id="origen-select" class="w-full bg-nexus-950 border border-nexus-800 rounded-xl p-3 text-sm text-white focus:border-indigo-500 focus:outline-none transition-all"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] text-indigo-300/40 mb-1.5 font-black uppercase">Destino Final</label>
                                <select id="destino-select" class="w-full bg-nexus-950 border border-nexus-800 rounded-xl p-3 text-sm text-white focus:border-indigo-500 focus:outline-none transition-all"></select>
                            </div>
                            <!-- Botón actualizado a color Ámbar -->
                            <button onclick="efectuarViaje()" class="w-full py-4 bg-amber-500 text-nexus-950 rounded-xl font-black hover:bg-amber-400 transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest flex justify-center items-center gap-2">
                                Iniciar Viaje <i data-lucide="zap" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div id="sidebar-content" class="sidebar-scroll space-y-3 max-h-[30vh] xl:max-h-[400px] overflow-y-auto pr-2"></div>
                </aside>

                <div class="xl:col-span-3 order-1 xl:order-2">
                    <div id="map" class="border border-nexus-800 shadow-2xl relative overflow-hidden"></div>
                    
                    <div id="info-panel" class="mt-4 p-6 bg-nexus-900 rounded-2xl border-l-4 border-amber-400 shadow-xl hidden animate-in fade-in slide-in-from-bottom-4">
                        <p id="info-city" class="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-1"></p>
                        <h3 id="info-title" class="text-xl font-bold text-white"></h3>
                        <p id="info-desc" class="text-sm text-indigo-100/60 mt-2 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="history-view" class="view-content p-4 lg:p-8">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-white">Registro de Viajes</h2>
                <div class="h-1 w-12 bg-amber-500 mt-2 rounded-full"></div>
            </header>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-8 text-center md:text-left">
                <div class="bg-nexus-900 p-6 rounded-2xl border border-nexus-800 shadow-lg">
                    <p class="text-indigo-300/30 text-[10px] uppercase font-black tracking-widest">Total Saltos</p>
                    <p id="stat-trips" class="text-4xl font-black text-white">0</p>
                </div>
                <div class="bg-nexus-900 p-6 rounded-2xl border border-nexus-800 shadow-lg">
                    <p class="text-indigo-300/30 text-[10px] uppercase font-black tracking-widest">Kilómetros</p>
                    <p id="stat-km" class="text-4xl font-black text-white">0</p>
                </div>
            </div>

            <div class="bg-nexus-900 rounded-2xl border border-nexus-800 overflow-hidden shadow-xl">
                <table class="w-full text-left">
                    <thead class="bg-nexus-950/50 border-b border-nexus-800">
                        <tr>
                            <th class="p-5 text-[10px] uppercase text-indigo-300/40 font-black">Destino</th>
                            <th class="p-5 text-[10px] uppercase text-indigo-300/40 font-black">Coste</th>
                            <th class="p-5 text-[10px] uppercase text-indigo-300/40 font-black">Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody" class="divide-y divide-nexus-800/30"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Barra de Navegación con línea divisoria -->
    <nav class="fixed bottom-0 left-0 right-0 bg-nexus-900/80 backdrop-blur-xl border-t border-nexus-800 h-20 flex items-center justify-center z-[1000]">
        <button onclick="switchView('map-view')" id="nav-map-view" class="flex-1 flex flex-col items-center gap-1 text-indigo-500 active-tab transition-all">
            <i data-lucide="map" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase">Mapa</span>
        </button>
        
        <div class="nav-divider"></div>
        
        <button onclick="switchView('history-view')" id="nav-history-view" class="flex-1 flex flex-col items-center gap-1 text-indigo-500 transition-all">
            <i data-lucide="database" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase">Datos</span>
        </button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        let map, markersList = [], pendingTrip = null, routeLine = null;
        
        const pointsData = {
            "Madrid": { locations: [{ name: "Puerta del Sol", coords: [40.4167, -3.7033], desc: "Nodo central de comunicaciones de la península." }] },
            "Barcelona": { locations: [{ name: "Sagrada Familia", coords: [41.4036, 2.1744], desc: "Punto de enlace modernista en la costa este." }] },
            "Sevilla": { locations: [{ name: "La Giralda", coords: [37.3862, -5.9925], desc: "Conexión histórica del sur peninsular." }] },
            "Bilbao": { locations: [{ name: "Guggenheim", coords: [43.2685, -2.9340], desc: "Centro de resonancia artística del norte." }] },
            "Salamanca": { locations: [{ name: "Plaza Mayor", coords: [40.9650, -5.6641], desc: "Corazón del conocimiento y enlace académico." }] }
        };

        let tripHistory = [];

        window.onload = function() {
            lucide.createIcons();
            initMap();
            populateSelects();
            renderSidebar();
            addMarkers();
            updatePopups();
            document.getElementById('origen-select').addEventListener('change', updatePopups);
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([40.4167, -3.7037], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);
        }

        function populateSelects() {
            const selects = [document.getElementById('origen-select'), document.getElementById('destino-select')];
            let html = '';
            for (const city in pointsData) {
                pointsData[city].locations.forEach(loc => {
                    html += `<option value="${city}|${loc.name}">${city} - ${loc.name}</option>`;
                });
            }
            selects.forEach(s => {
                s.innerHTML = html;
                if(s.id === 'destino-select') s.selectedIndex = 1;
            });
        }

        function addMarkers() {
            const icon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="w-4 h-4 bg-indigo-500 rounded-full border-2 border-white shadow-[0_0_10px_#6366f1]"></div>`,
                iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -10]
            });
            for (const city in pointsData) {
                pointsData[city].locations.forEach(loc => {
                    const m = L.marker(loc.coords, { icon }).addTo(map);
                    markersList.push({ marker: m, loc, city });
                    m.on('click', () => showInfo(city, loc));
                });
            }
        }

        function updatePopups() {
            const orig = document.getElementById('origen-select').value.split('|');
            const originLoc = pointsData[orig[0]].locations.find(l => l.name === orig[1]);
            const originLatLng = L.latLng(originLoc.coords);

            markersList.forEach(item => {
                const dist = originLatLng.distanceTo(L.latLng(item.loc.coords)) / 1000;
                const precio = (dist / 500) * 10;
                const html = `
                    <div class="text-center">
                        <p class="font-black text-xs text-white mb-1 uppercase">${item.loc.name}</p>
                        <p class="text-[9px] text-indigo-300 uppercase mb-2">Desde ${orig[0]}</p>
                        <p class="text-amber-400 font-black text-base">${dist < 1 ? 'LOCAL' : precio.toFixed(2) + ' CR'}</p>
                    </div>
                `;
                item.marker.bindPopup(html);
            });
        }

        function efectuarViaje() {
            const origVal = document.getElementById('origen-select').value;
            const destVal = document.getElementById('destino-select').value;
            if (origVal === destVal) return showToast("El origen y el destino son el mismo", true);

            const [oC, oL] = origVal.split('|');
            const [dC, dL] = destVal.split('|');
            const oData = pointsData[oC].locations.find(l => l.name === oL);
            const dData = pointsData[dC].locations.find(l => l.name === dL);

            const dist = Math.round(L.latLng(oData.coords).distanceTo(L.latLng(dData.coords)) / 1000);
            if(routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([oData.coords, dData.coords], { color: '#fbbf24', weight: 2, dashArray: '10, 10' }).addTo(map);
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

            pendingTrip = { dC, dL, dist, date: new Date().toLocaleTimeString() };
            document.getElementById('modal-desc').innerText = `Ruta: ${oC} a ${dC} (${dist} km)`;
            document.getElementById('modal-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=NEXUS-${dC}&color=0a0c1a`;
            document.getElementById('trip-modal').classList.remove('hidden');
        }

        function confirmarViaje() {
            tripHistory.unshift(pendingTrip);
            renderHistory();
            document.getElementById('trip-modal').classList.add('hidden');
            showToast("Salto completado con éxito");
            pendingTrip = null;
        }

        function cancelarViaje() {
            document.getElementById('trip-modal').classList.add('hidden');
            if(routeLine) map.removeLayer(routeLine);
        }

        function renderHistory() {
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = '';
            let totalKm = 0;
            tripHistory.forEach(t => {
                totalKm += t.dist;
                tbody.innerHTML += `
                    <tr class="hover:bg-nexus-800/30 transition-colors">
                        <td class="p-5 font-bold text-white text-sm">${t.dC} <span class="text-xs text-indigo-400 block font-normal">${t.dL}</span></td>
                        <td class="p-5 text-amber-400 font-black">${((t.dist/500)*10).toFixed(2)} CR</td>
                        <td class="p-5 text-indigo-300/30 text-[10px] font-bold">${t.date}</td>
                    </tr>
                `;
            });
            document.getElementById('stat-trips').innerText = tripHistory.length;
            document.getElementById('stat-km').innerText = totalKm;
        }

        function switchView(id) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-tab');
            if(id === 'map-view') setTimeout(() => map.invalidateSize(), 200);
        }

        function showInfo(city, loc) {
            const p = document.getElementById('info-panel');
            document.getElementById('info-city').innerText = city;
            document.getElementById('info-title').innerText = loc.name;
            document.getElementById('info-desc').innerText = loc.desc;
            p.classList.remove('hidden');
            lucide.createIcons();
        }

        function renderSidebar() {
            const cont = document.getElementById('sidebar-content');
            cont.innerHTML = '';
            for (const city in pointsData) {
                const card = document.createElement('div');
                card.className = "bg-nexus-900 border border-nexus-800 p-4 rounded-xl";
                card.innerHTML = `<p class="text-[10px] font-black text-indigo-400 uppercase mb-2 tracking-widest">${city}</p>`;
                pointsData[city].locations.forEach(loc => {
                    card.innerHTML += `<button onclick="showInfo('${city}', ${JSON.stringify(loc).replace(/"/g, '&quot;')})" class="w-full text-left p-2 text-xs text-slate-400 hover:text-white transition-colors">${loc.name}</button>`;
                });
                cont.appendChild(card);
            }
        }

        function showToast(msg, error = false) {
            const t = document.createElement('div');
            t.className = `toast-enter p-4 rounded-xl text-xs font-black uppercase tracking-widest ${error ? 'bg-red-900/80 text-white' : 'bg-indigo-600 text-white shadow-lg'}`;
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
