<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bocetos GitHub Pages</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f8fa;
        color: #24292f;
      }
      main {
        background: white;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 24px;
        width: min(560px, 90vw);
      }
      ul {
        padding-left: 18px;
      }
      a {
        color: #0969da;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Entradas disponibles</h1>
      <p>Selecciona qué versión quieres abrir:</p>
      <ul>
        <li><a href="./david/">Boceto David</a></li>
        <li><a href="./marco/">Boceto Marco</a></li>
      </ul>
    </main>
  </body>
</html>
